<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'"
        />
        <title>VIBRA // MODULAR_SYNTH</title>
    </head>
    <body>
        <div id="app">
            <header class="app-header">
                <div class="brand">
                    <span class="label">content overview</span>
                    <h1>vibra</h1>
                </div>
                <div class="toolbar">
                    <button id="btn-start">start</button>
                    <select id="example-select" class="example-select">
                        <option value="">examples</option>
                        <option value="hello">simple sine</option>
                        <option value="pluck">pluck synth</option>
                        <option value="tremolo">tremolo pad</option>
                        <option value="echo">echo pluck</option>
                        <option value="perc">noise hi-hat</option>
                        <option value="acid">acid bass</option>
                        <option value="juno">juno pad</option>
                        <option value="fmbell">fm bell</option>
                        <option value="space">space drone</option>
                        <option value="minecraft">c418 pad</option>
                    </select>
                    <button id="btn-snap" aria-pressed="true">snap</button>
                    <button id="btn-clear">clear</button>
                    <button id="btn-export">save</button>
                    <button id="btn-import">load</button>
                    <input
                        type="file"
                        id="file-import"
                        accept=".json,.osp.json"
                        style="display: none"
                    />
                </div>
            </header>
            <div id="patch-warning" class="patch-warning hidden"></div>
            <div class="app-body">
                <aside class="palette" id="palette">
                    <h2>modules</h2>
                    <div class="palette-list" id="palette-list"></div>
                    <h2>plugins</h2>
                    <div class="plugin-list" id="plugin-list">
                        <p class="hint">
                            drop .js files into frontend/src/plugins/ to load
                        </p>
                    </div>
                </aside>
                <main class="rack-container" id="rack-container">
                    <div class="rack-grid" id="rack-grid">
                        <svg class="cables" id="cables"></svg>
                    </div>
                    <button id="btn-arrange" class="fab-arrange" title="auto-arrange modules">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="20" height="20">
                            <rect width="256" height="256" fill="none"/>
                            <rect x="48" y="48" width="64" height="64" rx="8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                            <rect x="144" y="48" width="64" height="64" rx="8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                            <rect x="48" y="144" width="64" height="64" rx="8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                            <rect x="144" y="144" width="64" height="64" rx="8" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
                        </svg>
                    </button>
                </main>
            </div>
            <footer class="app-footer">
                <div id="keyboard"></div>
                <canvas id="scope" width="320" height="96"></canvas>
                <div class="status">
                    <span id="bridge-status">CHECKING...</span>
                </div>
            </footer>
        </div>
        <script type="module" src="/src/main.js"></script>
    </body>
</html>
